openapi: 3.1.0
info:
  title: Booking Service API
  version: 1.0.0
  description: API для управления аудиториями и бронированиями

paths:

  /rooms:
    get:
      summary: Получить список аудиторий
      responses:
        '200':
          description: Список аудиторий
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Room'
        '500':
          description: Внутренняя ошибка сервера

  /rooms/{id}:
    get:
      summary: Получить расписание аудитории
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Расписание аудитории
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScheduleItem'
        '404':
          description: Аудитория не найдена
        '500':
          description: Внутренняя ошибка сервера

  /booking:
    post:
      summary: Создать бронирование
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
      responses:
        '200':
          description: Бронирование создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          description: Некорректные данные запроса
        '401':
          description: Пользователь не авторизован
        '404':
          description: Аудитория не найдена
        '409':
          description: Аудитория уже занята
        '500':
          description: Внутренняя ошибка сервера

  /booking/my:
    get:
      summary: Получить бронирования текущего пользователя
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Список бронирований пользователя
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'

        '400':
          description: Некорректные данные запроса

        '500':
          description: Внутренняя ошибка сервера

  /booking/{id}:
    delete:
      summary: Отменить бронирование
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Бронирование отменено
        '401':
          description: Пользователь не авторизован
        '404':
          description: Бронирование не найдено
        '500':
          description: Внутренняя ошибка сервера

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    Room:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        capacity:
          type: integer
        building:
          type: string

    ScheduleItem:
      type: object
      properties:
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        type:
          type: string
        teacher:
          type: string
        group_numbers:
          type: array
          items:
            type: string

    CreateBookingRequest:
      type: object
      properties:
        room_id:
          type: integer
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
      required:
        - room_id
        - start_time
        - end_time

    Booking:
      type: object
      properties:
        id:
          type: integer
        room_id:
          type: integer
        start_time:
          type: string
        end_time:
          type: string