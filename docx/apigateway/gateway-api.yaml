openapi: 3.1.0
info:
  title: API Gateway
  version: 1.0.0
  description: Reverse proxy для маршрутизации запросов к сервисам

paths:

  # AUTH SERVICE
  /auth/register:
    post:
      summary: Proxy to Auth Service
      responses:
        '200':
          description: Пользователь создан
        '400':
          description: Некорректные данные
        '500':
          description: Внутренняя ошибка сервера

  /auth/login:
    post:
      summary: Proxy to Auth Service
      responses:
        '200':
          description: Успешная авторизация
        '401':
          description: Неверный login или пароль
        '500':
          description: Внутренняя ошибка сервера

  /users:
    get:
      summary: Proxy to Auth Service - list users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список пользователей
        '401':
          description: JWT не передан или недействителен
        '403':
          description: Доступ разрешён только admin
        '500':
          description: Внутренняя ошибка сервера

  /users/me:
    get:
      summary: Proxy to Auth Service - get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Текущий пользователь
        '401':
          description: JWT не передан или недействителен
        '404':
          description: Пользователь не найден
        '500':
          description: Внутренняя ошибка сервера

    put:
      summary: Proxy to Auth Service - update current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Пользователь обновлён
        '400':
          description: Некорректные данные запроса
        '401':
          description: JWT не передан или недействителен
        '403':
          description: Поле role можно менять только через admin endpoint
        '404':
          description: Пользователь не найден
        '409':
          description: Новый login уже занят
        '500':
          description: Внутренняя ошибка сервера

    delete:
      summary: Proxy to Auth Service - delete current user
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Пользователь удалён
        '401':
          description: JWT не передан или недействителен
        '404':
          description: Пользователь не найден
        '500':
          description: Внутренняя ошибка сервера

  /users/{id}:
    get:
      summary: Proxy to Auth Service - get user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Пользователь найден
        '400':
          description: Некорректный id
        '401':
          description: JWT не передан или недействителен
        '403':
          description: Доступ разрешён только admin
        '404':
          description: Пользователь не найден
        '500':
          description: Внутренняя ошибка сервера

    put:
      summary: Proxy to Auth Service - update user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Пользователь обновлён
        '400':
          description: Некорректные данные запроса
        '401':
          description: JWT не передан или недействителен
        '403':
          description: Доступ разрешён только admin
        '404':
          description: Пользователь не найден
        '409':
          description: Новый login уже занят
        '500':
          description: Внутренняя ошибка сервера

    delete:
      summary: Proxy to Auth Service - delete user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Пользователь удалён
        '400':
          description: Некорректный id
        '401':
          description: JWT не передан или недействителен
        '403':
          description: Доступ разрешён только admin
        '404':
          description: Пользователь не найден
        '500':
          description: Внутренняя ошибка сервера

  # BOOKING SERVICE
  /rooms:
    get:
      summary: Proxy to Booking Service
      responses:
        '200':
          description: Список аудиторий
        '500':
          description: Внутренняя ошибка сервера

  /rooms/{id}:
    get:
      summary: Proxy to Booking Service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Расписание аудитории
        '404':
          description: Аудитория не найдена
        '500':
          description: Внутренняя ошибка сервера

  /booking:
    post:
      summary: Proxy to Booking Service
      responses:
        '200':
          description: Бронирование создано
        '400':
          description: Некорректные данные запроса
        '404':
          description: Аудитория не найдена
        '409':
          description: Аудитория уже занята
        '500':
          description: Внутренняя ошибка сервера

  /booking/{id}:
    delete:
      summary: Proxy to Booking Service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Бронирование отменено
        '404':
          description: Бронирование не найдено
        '500':
          description: Внутренняя ошибка сервера

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
