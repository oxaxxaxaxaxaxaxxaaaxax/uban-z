input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  if [time] {
    date {
      match => ["time", "ISO8601"]
      target => "@timestamp"
    }
  }

  if ![event] {
    drop { }
  }

  if [event] not in [
    "auth.register.succeeded",
    "auth.register.failed",
    "auth.login.succeeded",
    "auth.login.failed",
    "booking.created",
    "booking.cancelled",
    "booking.conflict",
    "parser.startup_import.completed",
    "parser.startup_import.skipped",
    "parser.startup_import.failed"
  ] {
    drop { }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "uban-z-logs-%{+YYYY.MM.dd}"
  }
}
