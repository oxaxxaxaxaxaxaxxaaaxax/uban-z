version: "2"
sql:
  - engine: postgresql
    queries: query.sql
    schema: ../../../../migrations/booking
    gen:
      go:
        package: sqlcgen
        out: sqlcgen
        sql_package: pgx/v5
        emit_json_tags: false
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: false
