name: uban-z

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    restart: unless-stopped
    ports:
      - "5044:5044"
    volumes:
      - ./deploy/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      elasticsearch:
        condition: service_healthy

  auth-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth
    ports:
      - "5433:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  booking-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
      POSTGRES_DB: booking
    ports:
      - "5432:5432"
    volumes:
      - booking_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking -d booking"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  auth-migrate:
    image: ghcr.io/kukymbr/goose-docker:latest
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "host=auth-postgres port=5432 user=auth password=auth dbname=auth sslmode=disable"
      GOOSE_MIGRATION_DIR: /migrations
    volumes:
      - ./migrations/auth:/migrations:ro
    depends_on:
      auth-postgres:
        condition: service_healthy

  booking-migrate:
    image: ghcr.io/kukymbr/goose-docker:latest
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "host=booking-postgres port=5432 user=booking password=booking dbname=booking sslmode=disable"
      GOOSE_MIGRATION_DIR: /migrations
    volumes:
      - ./migrations/booking:/migrations:ro
    depends_on:
      booking-postgres:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: cmd/auth_service/Dockerfile
    image: uban-z/auth-service:dev
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://auth:auth@auth-postgres:5432/auth?sslmode=disable"
      JWT_SECRET: "dev-only-secret-replace-me"
      LOGSTASH_ADDR: "logstash:5044"
      SERVICE_NAME: "auth-service"
    depends_on:
      auth-postgres:
        condition: service_healthy
      auth-migrate:
        condition: service_completed_successfully

  booking-service:
    build:
      context: .
      dockerfile: cmd/booking/Dockerfile
    image: uban-z/booking-service:dev
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://booking:booking@booking-postgres:5432/booking?sslmode=disable"
      LOG_LEVEL: info
      SHUTDOWN_TIMEOUT: 5s
      EVENTS_ENABLED: "true"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      RABBITMQ_EXCHANGE: booking.events
      JWT_SECRET: "dev-only-secret-replace-me"
      PARSER_BASE_URL: "https://table.nsu.ru"
      PARSER_TIMEOUT: 30s
      PARSER_WEEKS_AHEAD: "16"
      PARSER_DEFAULT_BUILDING: "НГУ"
      PARSER_DEFAULT_CAPACITY: "30"
      PARSER_TIMEZONE: "Asia/Novosibirsk"
      LOGSTASH_ADDR: "logstash:5044"
      SERVICE_NAME: "booking-service"
    depends_on:
      booking-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      booking-migrate:
        condition: service_completed_successfully

  gateway-api:
    build:
      context: .
      dockerfile: cmd/app/Dockerfile
    image: uban-z/gateway-api:dev
    restart: unless-stopped
    environment:
      PORT: "8080"
      AUTH_SERVICE_URL: "http://auth-service:8080"
      BOOKING_SERVICE_URL: "http://booking-service:8080"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      LOGSTASH_ADDR: "logstash:5044"
      SERVICE_NAME: "gateway-api"
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_started
      booking-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_GATEWAY_URL: "http://localhost:8080"
    image: uban-z/frontend:dev
    restart: unless-stopped
    environment:
      API_GATEWAY_URL: "http://gateway-api:8080"
      NEXT_PUBLIC_API_GATEWAY_URL: "http://localhost:8080"
    ports:
      - "3000:3000"
    depends_on:
      gateway-api:
        condition: service_started

volumes:
  auth_postgres_data:
  booking_postgres_data:
  elasticsearch_data:
